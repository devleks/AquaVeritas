# AquaVeritas — LFM2.5-VL-450M Fine-tuning Config (Modal H100)
# Used by: scripts/finetune.py via leap-finetune

model:
  name: liquid-ai/LFM2.5-VL-450M
  trust_remote_code: true

dataset:
  train_path: /data/train.jsonl
  eval_path:  /data/test.jsonl
  format: conversational    # OpenAI chat format with image_url content blocks

training:
  output_dir:        /data/output
  num_epochs:        3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4   # effective batch = 8
  learning_rate:     2.0e-5
  warmup_ratio:      0.05
  lr_scheduler_type: cosine
  bf16:              true
  dataloader_num_workers: 4
  save_strategy:     epoch
  eval_strategy:     epoch
  load_best_model_at_end: true
  metric_for_best_model: eval_loss

finetune_type: full     # not LoRA — satellite imagery is underrepresented in pretraining

output:
  push_to_hub: true
  hub_model_id: OUTPUT_HF_REPO    # replaced at runtime by finetune.py

compute:
  provider: modal
  gpu: H100
  count: 1
  timeout_hours: 3
